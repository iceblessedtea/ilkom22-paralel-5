name: Quality

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend test, lint, and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run lint
      - run: npm run build

  backend:
    name: RSpec (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - patient-service
          - doctor-service
          - appointment-service
          - medical-record-service
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: healthcare
          POSTGRES_PASSWORD: healthcare
          POSTGRES_DB: service_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U healthcare -d service_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgres://healthcare:healthcare@localhost:5432/service_test

    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3.5"
          bundler-cache: true
          working-directory: services/${{ matrix.service }}
      - run: bundle exec rspec
        working-directory: services/${{ matrix.service }}

  ruby-lint:
    name: Ruby syntax lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3.5"
      - run: bash services/scripts/lint-ruby.sh

  compose:
    name: Docker Compose validation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - run: docker compose config
        working-directory: services
      - run: docker compose -f docker-compose.yml -f ../observability/docker-compose.otel.yml config
        working-directory: services

  docker-smoke:
    name: Docker smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
      - run: bash services/scripts/smoke-docker.sh
