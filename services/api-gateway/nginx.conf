events {}

http {
    map $request_method $cors_allow_methods {
        default "GET, POST, PUT, DELETE, OPTIONS";
    }

    upstream doctors {
        server doctor-service:7861;
    }

    upstream medical_records {
        server medical-record-service:7863;
    }
    upstream patients {
        server patient-service:7860;
    }

    upstream appointments {
        server appointment-service:7862;
    }

    server {
        listen 80;

        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods $cors_allow_methods always;
        add_header Access-Control-Allow-Headers "Content-Type, Accept, Authorization" always;
        add_header Access-Control-Max-Age 86400 always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        location = /api/health {
            default_type application/json;
            return 200 '{"status":"ok","service":"api-gateway"}';
        }

        location /api/doctors {
            rewrite ^/api(/doctors.*)$ $1 break;
            proxy_pass http://doctors;
        }

        location /api/rooms {
            rewrite ^/api(/rooms.*)$ $1 break;
            proxy_pass http://doctors;
        }

        location /api/timeslots {
            rewrite ^/api(/timeslots.*)$ $1 break;
            proxy_pass http://doctors;
        }

        location /api/schedules {
            rewrite ^/api(/schedules.*)$ $1 break;
            proxy_pass http://doctors;
        }

        location /api/patients {
            rewrite ^/api(/patients.*)$ $1 break;
            proxy_pass http://patients;
        }

        location /api/appointments {
            rewrite ^/api(/appointments.*)$ $1 break;
            proxy_pass http://appointments;
        }

        location /api/medical-records {
            rewrite ^/api(/medical-records.*)$ $1 break;
            proxy_pass http://medical_records;
        }

        location /api/medical_records {
            rewrite ^/api(/medical_records.*)$ $1 break;
            proxy_pass http://medical_records;
        }

        location /doctors {
            proxy_pass http://doctors;
        }

        location /medical_records {
            proxy_pass http://medical_records;
        }

        location /medical-records {
            proxy_pass http://medical_records;
        }

        location /patients {
            proxy_pass http://patients;
        }

        location /appointments {
            proxy_pass http://appointments;
        }
    }
}
