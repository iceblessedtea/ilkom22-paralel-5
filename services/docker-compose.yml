services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-healthcare}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-healthcare}
      POSTGRES_DB: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-healthcare} -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"

  doctor-service:
    build: ./doctor-service
    ports:
      - "7861:7861"
    environment:
      RACK_ENV: production
      PORT: 7861
      DATABASE_URL: postgres://${POSTGRES_USER:-healthcare}:${POSTGRES_PASSWORD:-healthcare}@postgres:5432/doctor_service
      APPOINTMENT_URL: http://appointment-service:7862
      OTEL_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy

  medical-record-service:
    build: ./medical-record-service
    ports:
      - "7863:7863"
    environment:
      RACK_ENV: production
      PORT: 7863
      DATABASE_URL: postgres://${POSTGRES_USER:-healthcare}:${POSTGRES_PASSWORD:-healthcare}@postgres:5432/medical_record_service
      PATIENT_URL: http://patient-service:7860
      OTEL_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy

  patient-service:
    build: ./patient-service
    ports:
      - "7860:7860"
    environment:
      RACK_ENV: production
      PORT: 7860
      DATABASE_URL: postgres://${POSTGRES_USER:-healthcare}:${POSTGRES_PASSWORD:-healthcare}@postgres:5432/patient_service
      DOCTOR_URL: http://doctor-service:7861
      MEDICAL_RECORD_URL: http://medical-record-service:7863
      OTEL_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy

  appointment-service:
    build: ./appointment-service
    ports:
      - "7862:7862"
    environment:
      RACK_ENV: production
      PORT: 7862
      DATABASE_URL: postgres://${POSTGRES_USER:-healthcare}:${POSTGRES_PASSWORD:-healthcare}@postgres:5432/appointment_service
      PATIENT_URL: http://patient-service:7860
      DOCTOR_URL: http://doctor-service:7861
      OTEL_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy

  api_gateway:
    build: ./api-gateway
    ports:
      - "80:80"
    depends_on:
      - doctor-service
      - medical-record-service
      - patient-service
      - appointment-service

volumes:
  postgres-data:
