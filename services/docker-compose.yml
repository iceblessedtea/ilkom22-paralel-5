services:
  doctors:
    build: ./doctor-service
    ports:
      - "7861:7861"
    environment:
      - RACK_ENV=production
      - BIND=0.0.0.0
    depends_on:
      - appointments

  medical_records:
    build: ./medical-record-service
    ports:
      - "7863:7863"

  patients:
    build: ./patient-service
    ports:
      - "7860:7860"

  appointments:
    build: ./appointment-service
    ports:
      - "7862:7862"

  api_gateway:
    build: ./api-gateway
    ports:
      - "80:80"
    depends_on:
      - doctors
      # - medical_records
      - patients
      - appointments
